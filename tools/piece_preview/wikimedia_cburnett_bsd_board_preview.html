<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Turbo Chess Cburnett BSD Piece Preview</title>
  <style>
    :root {
      --light: #e6d8bd;
      --dark: #5e7c66;
      --frame-a: #2a2117;
      --frame-b: #111414;
      --text: #f6ead2;
      --muted: #b8aa91;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121414;
      color: var(--text);
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .boards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .caption {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .frame {
      padding: 10px;
      border: 1px solid #5b4930;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--frame-a), var(--frame-b));
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.38);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 12px;
    }

    .square {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
    }

    .light {
      background: var(--light);
    }

    .dark {
      background: var(--dark);
    }

    img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <h1>Turbo Chess Wikimedia Cburnett BSD Pieces</h1>
    <section class="boards">
      <article>
        <p class="caption">Starting position</p>
        <div class="frame">
          <div class="board" data-fen="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR"></div>
        </div>
      </article>
      <article>
        <p class="caption">Sample middlegame FEN</p>
        <div class="frame">
          <div class="board" data-fen="r2q1rk1/pp2bppp/2n1pn2/2bp4/2PP4/2NBPN2/PPQ2PPP/R1B2RK1"></div>
        </div>
      </article>
    </section>
  </main>
  <script>
    const assets = {
      K: '../../assets/pieces/cburnett_bsd/svg/wK.svg',
      Q: '../../assets/pieces/cburnett_bsd/svg/wQ.svg',
      R: '../../assets/pieces/cburnett_bsd/svg/wR.svg',
      B: '../../assets/pieces/cburnett_bsd/svg/wB.svg',
      N: '../../assets/pieces/cburnett_bsd/svg/wN.svg',
      P: '../../assets/pieces/cburnett_bsd/svg/wP.svg',
      k: '../../assets/pieces/cburnett_bsd/svg/bK.svg',
      q: '../../assets/pieces/cburnett_bsd/svg/bQ.svg',
      r: '../../assets/pieces/cburnett_bsd/svg/bR.svg',
      b: '../../assets/pieces/cburnett_bsd/svg/bB.svg',
      n: '../../assets/pieces/cburnett_bsd/svg/bN.svg',
      p: '../../assets/pieces/cburnett_bsd/svg/bP.svg',
    };

    document.querySelectorAll('.board').forEach((board) => {
      const pieces = board.dataset.fen.split('/').flatMap((rank) => {
        const row = [];
        for (const char of rank) {
          const empty = Number.parseInt(char, 10);
          if (Number.isInteger(empty)) {
            for (let index = 0; index < empty; index += 1) row.push('');
          } else {
            row.push(char);
          }
        }
        return row;
      });

      pieces.forEach((piece, index) => {
        const square = document.createElement('div');
        const row = Math.floor(index / 8);
        const col = index % 8;
        square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
        if (piece) {
          const img = document.createElement('img');
          img.src = assets[piece];
          img.alt = piece;
          square.appendChild(img);
        }
        board.appendChild(square);
      });
    });
  </script>
</body>
</html>
